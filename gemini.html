<!DOCTYPE html>
<html>
<body>
<h2>Gemini Test</h2>

<textarea id="input" placeholder="Ask something..."></textarea>
<button onclick="askGemini()">Send</button>

<pre id="output"></pre>

<script>
async function askGemini() {
  const API_KEY = "AIzaSyBfk948jvz6oNueCPKkrDtf_4fPfYQhqWc";  // Replace with your key
  const endpoint = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY;

  const requestData = {
    contents: [{ parts: [{ text: document.getElementById("input").value }] }]
  };

  const response = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(requestData)
  });

  const data = await response.json();
  document.getElementById("output").textContent =
    data.candidates?.[0]?.content?.parts?.[0]?.text || "No output";
}
</script>

</body>
</html>
